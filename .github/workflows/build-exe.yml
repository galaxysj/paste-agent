name: auto exe build

on:
  push:
    paths:
      - 'python/paste-agent.py' 
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest # EXE 빌드를 위해 윈도우 환경 사용
    permissions:       
      contents: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build EXE
      run: |
        cd python
        pyinstaller --onefile --icon=exe.ico paste-agent.py

    - name: Copy EXE to Root and Push
      run: |
        # 1. 빌드된 파일을 루트의 agent.exe로 복사
        copy /y python\dist\paste-agent.exe agent.exe
        
        # 2. Git 설정
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 3. 변경사항 스테이징 및 커밋
        git add agent.exe
        
        # 4. 변경사항이 있을 때만 커밋 (없으면 스킵)
        git diff-index --quiet HEAD || git commit -m "compile agent.exe"
        
        # 5. 푸시
        git push
