name: auto exe build

on:
  push:
    paths:
      - 'python/paste-agent.py' 
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest # EXE 빌드를 위해 윈도우 환경 사용
    permissions:       
      contents: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build EXE
      run: |
        cd python
        pyinstaller --onefile --icon=exe.ico paste-agent.py

    - name: Copy EXE to Root and Push
      run: |
        # PowerShell 문법: Copy-Item -Force를 사용합니다.
        Copy-Item -Path "python\dist\paste-agent.exe" -Destination "agent.exe" -Force
        
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        git add agent.exe
        git diff-index --quiet HEAD || git commit -m "compile agent.exe"
        git push
